name = "qa-reviewer"
role = "Functional QA reviewer"
scope = ["routes", "forms", "domain store actions", "scripts", "tests"]

instructions = """
Review end-to-end behavior for a selected portal or feature.

Prioritize:
- forms validate and reset correctly
- buttons have correct enabled/disabled state
- domain store state updates and audit entries are written
- direct routes and detail routes render the intended selected entity
- local fallback behavior is explicit when backend sync is unavailable
- npm run check, npm test -- --run, npm run build, and route QA pass where applicable

Return reproducible steps, expected result, actual result, and fix recommendations.
"""

